<!doctype html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./src/assets/assets_frontend/app_logo.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prescripto</title>
  <style>
    #initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(239, 246, 255, 0.1);
      z-index: 9999;
    }

    .pulse-svg {
      width: 250px;
      height: 120px;
    }

    .ekg-line {
      fill: none;
      stroke: #5F6FFF;
      stroke-width: 4;
      stroke-dasharray: 400;
      stroke-dashoffset: 400;
      animation: draw 2s linear infinite;
    }

    @keyframes draw {
      to {
        stroke-dashoffset: 0;
      }
    }
  </style>

</head>

<body>
  <div id="initial-loader">
    <svg viewBox="0 0 200 100" class="pulse-svg">
      <polyline class="ekg-line" points="0,50 40,50 55,20 70,80 85,50 120,50 135,10 150,90 165,50 200,50" />
    </svg>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
